<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda de Tarefas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <span class="sidebar-icon">📝</span>
            <div>
              <h2>Agenda de Tarefas</h2>
              <p>Meu painel</p>
            </div>
          </div>
        </div>

        <div class="sidebar-calendar">
          <div class="calendar-panel-header">
            <button
              id="prev-month"
              class="icon-button"
              aria-label="Mês anterior"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                width="18"
                height="18"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"
                  fill="currentColor"
                />
              </svg>
            </button>
            <div class="calendar-panel-title">
              <span id="calendar-month-year"></span>
              <p>Selecione um dia para filtrar</p>
            </div>
            <button
              id="next-month"
              class="icon-button"
              aria-label="Próximo mês"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                width="18"
                height="18"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="m9 18 6-6-6-6-1.41 1.41L12.17 12l-4.58 4.59z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>
          <div class="calendar-nav">
            <select
              id="calendar-month-select"
              aria-label="Selecionar mês"
            ></select>
            <select
              id="calendar-year-select"
              aria-label="Selecionar ano"
            ></select>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="sidebar-filters">
          <div class="filters-title">Filtros Rápidos</div>
          <div class="filter-buttons">
            <button
              type="button"
              class="filter-button active"
              data-filter="all"
            >
              Todas as tarefas
            </button>
            <button type="button" class="filter-button" data-filter="today">
              Hoje
            </button>
            <button type="button" class="filter-button" data-filter="overdue">
              Atrasadas
            </button>
            <button type="button" class="filter-button" data-filter="completed">
              Concluídas
            </button>
          </div>
        </div>
      </aside>
      <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

      <div class="content-panel">
        <header class="app-header">
          <div class="page-header-row">
            <button
              id="sidebar-toggle"
              class="icon-button sidebar-toggle"
              aria-label="Abrir painel lateral"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                width="18"
                height="18"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M4 6h16M4 12h16M4 18h16"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <h2>Agenda de Tarefas</h2>
            <button id="add-task" class="primary-button">+ Nova tarefa</button>
          </div>
          <section class="search-bar">
            <input
              id="search-input"
              type="search"
              placeholder="Buscar por título ou descrição"
            />
          </section>
        </header>

        <section class="calendar-bar">
          <span id="view-type">Exibindo tarefas do dia: —</span>
          <input id="calendar-date" type="date" />
        </section>

        <section class="task-summary">
          <div class="task-summary-top">
            <span id="task-count">Não há tarefas para listagem</span>
            <button
              id="hide-completed"
              class="secondary-button icon-toggle-button"
              title="Oculta concluídas"
              aria-label="Oculta concluídas"
              data-hidden="false"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>
          <div class="progress-container">
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span id="progress-label" class="progress-label">0% concluído</span>
          </div>
        </section>

        <ul id="task-list" class="task-list"></ul>
      </div>
    </main>

    <div id="task-modal" class="modal hidden">
      <div class="modal-content">
        <button id="close-modal" class="close-button">×</button>
        <h2 id="modal-title">Nova tarefa</h2>
        <form id="task-form">
          <label>
            Título
            <input
              id="task-title"
              type="text"
              required
              placeholder="Digite o título da tarefa"
            />
          </label>
          <label>
            Descrição
            <textarea
              id="task-description"
              rows="3"
              placeholder="Descreva a tarefa..."
            ></textarea>
          </label>
          <label>
            Data de conclusão
            <input id="task-due-date" type="date" required />
          </label>
          <label>
            Hora
            <input id="task-due-time" type="time" />
          </label>
          <div class="form-actions">
            <button type="button" id="cancel-button" class="secondary-button">
              Cancelar
            </button>
            <button type="submit" class="primary-button">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
